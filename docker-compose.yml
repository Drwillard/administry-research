version: '3.8'

services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama
    depends_on:
      ollama:
        condition: service_healthy
    command: pull ${OLLAMA_MODEL:-qwen2.5:3b}
    restart: "no"

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANON_SALT=${ANON_SALT}
      - OUT_DIR=/app/out
      - STOPWORDS_FILE=/app/stopwords.txt
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
    volumes:
      - ./out:/app/out
      - ./stopwords.txt:/app/stopwords.txt
    depends_on:
      ollama-init:
        condition: service_completed_successfully

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://app:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

volumes:
  ollama_data:
